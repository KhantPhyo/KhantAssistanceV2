version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: khant
      POSTGRES_PASSWORD: khant
      POSTGRES_DB: khant
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      DB_PATH: /data/app.db
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-please-change-in-production}
    ports:
      - "8000:8000"
    volumes:
      - bedata:/data
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  bedata:
